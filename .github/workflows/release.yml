name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS x64 (Intel) - bun cross-compiles the target regardless of host arch;
          # macos-13 (Intel) hosted runner pool is retired/unassignable, use macos-latest
          - runner: macos-latest
            target: bun-darwin-x64
            binary: doraval-darwin-x64

          # macOS arm64 (Apple Silicon)
          - runner: macos-latest
            target: bun-darwin-arm64
            binary: doraval-darwin-arm64

          # Linux x64 (glibc)
          - runner: ubuntu-latest
            target: bun-linux-x64
            binary: doraval-linux-x64

          # Linux arm64 (use arm runner so the arm64 native deps are installed)
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            binary: doraval-linux-arm64

          # Windows x64 (native host — no cross-compile dance needed)
          - runner: windows-latest
            target: bun-windows-x64
            binary: doraval-win32-x64.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build compiled binary
        shell: bash
        run: |
          bun build ./src/cli/index.ts --compile --target ${{ matrix.target }} --outfile ${{ matrix.binary }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  smoke-binaries:
    needs: build-binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          # darwin-arm64 host is available; darwin-x64 has no free native runner
          # and ships without a pre-publish smoke run (covered by the
          # post-publish npx verification in publish-npm instead).
          - runner: macos-latest
            binary: doraval-darwin-arm64
          - runner: ubuntu-latest
            binary: doraval-linux-x64
          - runner: ubuntu-24.04-arm
            binary: doraval-linux-arm64
          - runner: windows-latest
            binary: doraval-win32-x64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.binary }}
      - name: Run the real binary — version + JSON scan, non-TTY
        shell: bash
        run: |
          chmod +x ${{ matrix.binary }} 2>/dev/null || true
          ./${{ matrix.binary }} --version
          mkdir -p smoke-repo/.git && cd smoke-repo
          ../${{ matrix.binary }} --format json | grep -q '"empty"'

  create-release:
    needs: [build-binaries, smoke-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download compiled binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude="$TAG" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            BODY=$(git log --pretty=format:"* %s" -20)
          else
            BODY=$(git log --pretty=format:"* %s" "$PREV_TAG"..HEAD | grep -vE '^(chore\(release\)|chore: bump version)' || echo "* Bug fixes and improvements")
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed"
          echo ""
          echo "$BODY"
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            artifacts/doraval-darwin-arm64
            artifacts/doraval-darwin-x64
            artifacts/doraval-linux-x64
            artifacts/doraval-linux-arm64
            artifacts/doraval-win32-x64.exe
          draft: false
          prerelease: false
          generate_release_notes: false

  publish-npm:
    needs: [build-binaries, smoke-binaries]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing (OIDC) needs npm >= 11.5.1; node 24 bundles a new
      # enough npm, but pin latest so the OIDC exchange never silently regresses.
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile

      - name: Download compiled binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Assemble platform packages
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          bun run scripts/platform-packages.ts "$VERSION" artifacts platform-packages

      - name: Publish platform packages (all five, then main)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 45
          # Auth is npm trusted publishing (OIDC): no tokens. Requires the
          # trusted-publisher config on npmjs.com for ALL six packages
          # (@hacksmith/doraval + the five @hacksmith/doraval-{darwin,linux,win32}-*),
          # each pointing at this repo + release.yml. Provenance is automatic.
          # Fail-fast: never publish main if any platform package fails — a main
          # package whose optionalDeps point at missing platform versions is a
          # broken install (v0.6.0 shipped main only; platforms stuck at 0.5.2).
          command: |
            set -euo pipefail
            VERSION=$(node -pe "require('./package.json').version")
            for dir in platform-packages/*/; do
              name=$(node -pe "require('./${dir}package.json').name")
              echo "Publishing $name@$VERSION from $dir"
              (cd "$dir" && npm publish --access public)
              # Confirm the version is on the registry before continuing
              for i in 1 2 3 4 5 6; do
                if npm view "$name@$VERSION" version 2>/dev/null | grep -qx "$VERSION"; then
                  echo "OK $name@$VERSION on registry"
                  break
                fi
                if [ "$i" -eq 6 ]; then
                  echo "ERROR: $name@$VERSION not visible on registry after publish"
                  exit 1
                fi
                sleep 10
              done
            done
            bun run scripts/prepare-npm-publish.ts
            npm publish --access public

      - name: Post-publish install verification (the real user path)
        run: |
          set -euo pipefail
          VERSION=$(node -pe "require('./package.json').version")
          # Confirm platform package for this runner exists (optionalDeps target)
          PLATFORM_PKG="@hacksmith/doraval-linux-x64"
          npm view "$PLATFORM_PKG@$VERSION" version | grep -qx "$VERSION"
          mkdir -p /tmp/verify && cd /tmp/verify
          # npx can omit optionalDeps; install into a real tree so the binary lands
          # Fresh versions can take several minutes to become resolvable.
          for i in $(seq 1 20); do
            rm -rf node_modules package.json package-lock.json
            npm init -y >/dev/null 2>&1
            if npm install --no-save --no-fund --no-audit "@hacksmith/doraval@$VERSION" 2>/tmp/npm-install.err; then
              if ./node_modules/.bin/doraval --version 2>/dev/null | grep -q .; then
                ./node_modules/.bin/doraval --version
                mkdir -p .git
                ./node_modules/.bin/doraval --format json | grep -q '"empty"'
                echo "install verification OK"
                exit 0
              fi
            fi
            echo "registry not consistent yet, retry $i"
            cat /tmp/npm-install.err || true
            sleep 30
          done
          echo "install verification failed after retries"
          exit 1

  publish-jsr:
    needs: [build-binaries, smoke-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx jsr publish

  update-homebrew:
    needs: create-release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS binaries from release
        env:
          TAG: ${{ github.ref_name }}
        run: |
          curl -fsSL "https://github.com/saif-shines/doraval/releases/download/${TAG}/doraval-darwin-arm64" -o doraval-darwin-arm64
          curl -fsSL "https://github.com/saif-shines/doraval/releases/download/${TAG}/doraval-darwin-x64" -o doraval-darwin-x64

      - name: Compute SHAs and update formula
        env:
          TAG: ${{ github.ref_name }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${TAG#v}
          ARM64_SHA=$(sha256sum doraval-darwin-arm64 | awk '{print $1}')
          X64_SHA=$(sha256sum doraval-darwin-x64 | awk '{print $1}')
          bash scripts/update-homebrew.sh "$VERSION" "$ARM64_SHA" "$X64_SHA"
