name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build Bun CLI bundle
        run: bun run build

      - name: Upload bin artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin
          path: bin/

      - name: Build compiled binaries
        run: |
          bun build ./src/cli/index.ts --compile --target bun-darwin-arm64 --outfile doraval-darwin-arm64
          bun build ./src/cli/index.ts --compile --target bun-darwin-x64   --outfile doraval-darwin-x64
          bun build ./src/cli/index.ts --compile --target bun-linux-x64    --outfile doraval-linux-x64
          bun build ./src/cli/index.ts --compile --target bun-linux-arm64  --outfile doraval-linux-arm64

      - name: Generate release notes from recent commits
        id: release-notes
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude="$TAG" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            BODY=$(git log --pretty=format:"* %s" -20)
            CHANGELOG_LINK=""
          else
            BODY=$(git log --pretty=format:"* %s" "$PREV_TAG"..HEAD | grep -vE '^(chore\(release\)|chore: bump version)' || echo "* Bug fixes and improvements")
            CHANGELOG_LINK="Full Changelog: https://github.com/saif-shines/doraval/compare/$PREV_TAG...$TAG"
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          if [ -n "$CHANGELOG_LINK" ]; then
            echo "$CHANGELOG_LINK" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: |
            doraval-darwin-arm64
            doraval-darwin-x64
            doraval-linux-x64
            doraval-linux-arm64
          body: ${{ steps.release-notes.outputs.body }}
          draft: false
          prerelease: false
          generate_release_notes: false

  publish-npm:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile

      - name: Download bin artifact
        uses: actions/download-artifact@v4
        with:
          name: bin
          path: bin/

      - name: Publish to npm (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm publish --access public --provenance

  publish-jsr:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx jsr publish

  update-homebrew:
    needs: build-and-release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS binaries from release
        env:
          TAG: ${{ needs.build-and-release.outputs.tag }}
        run: |
          curl -fsSL "https://github.com/saif-shines/doraval/releases/download/${TAG}/doraval-darwin-arm64" -o doraval-darwin-arm64
          curl -fsSL "https://github.com/saif-shines/doraval/releases/download/${TAG}/doraval-darwin-x64" -o doraval-darwin-x64

      - name: Compute SHAs and update formula
        env:
          TAG: ${{ needs.build-and-release.outputs.tag }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${TAG#v}
          ARM64_SHA=$(sha256sum doraval-darwin-arm64 | awk '{print $1}')
          X64_SHA=$(sha256sum doraval-darwin-x64 | awk '{print $1}')
          bash scripts/update-homebrew.sh "$VERSION" "$ARM64_SHA" "$X64_SHA"
