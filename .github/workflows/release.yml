name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build Bun CLI bundle
        run: bun run build

      - name: Build compiled binaries
        run: |
          bun build ./src/cli/index.ts --compile --target bun-darwin-arm64 --outfile doraval-darwin-arm64
          bun build ./src/cli/index.ts --compile --target bun-darwin-x64   --outfile doraval-darwin-x64
          bun build ./src/cli/index.ts --compile --target bun-linux-x64    --outfile doraval-linux-x64
          bun build ./src/cli/index.ts --compile --target bun-linux-arm64  --outfile doraval-linux-arm64

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            doraval-darwin-arm64
            doraval-darwin-x64
            doraval-linux-x64
            doraval-linux-arm64
          generate_release_notes: true

  publish-npm:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
