name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS runners are required for darwin native modules (@opentui/core etc.)
          - os: macos-latest
            target: bun-darwin-arm64
            binary: doraval-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            binary: doraval-darwin-x64

          # Linux builds
          - os: ubuntu-latest
            target: bun-linux-x64
            binary: doraval-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            binary: doraval-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build compiled binary
        run: |
          bun build ./src/cli/index.ts --compile --target ${{ matrix.target }} --outfile ${{ matrix.binary }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  build-js-bundle:
    # The non-compiled JS bundle + ui files (used by npm publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: bin
          path: bin/

  create-release:
    needs: [build-binaries, build-js-bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download compiled binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude="$TAG" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            BODY=$(git log --pretty=format:"* %s" -20)
          else
            BODY=$(git log --pretty=format:"* %s" "$PREV_TAG"..HEAD | grep -vE '^(chore\(release\)|chore: bump version)' || echo "* Bug fixes and improvements")
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed"
          echo ""
          echo "$BODY"
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            artifacts/doraval-darwin-arm64
            artifacts/doraval-darwin-x64
            artifacts/doraval-linux-x64
            artifacts/doraval-linux-arm64
          draft: false
          prerelease: false
          generate_release_notes: false

  publish-npm:
    needs: [build-binaries, build-js-bundle]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile

      - name: Download bin artifact
        uses: actions/download-artifact@v4
        with:
          name: bin
          path: bin/

      - name: Publish to npm (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm publish --access public --provenance

  publish-jsr:
    needs: [build-binaries, build-js-bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx jsr publish

  update-homebrew:
    needs: build-binaries
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS binaries from release
        env:
          TAG: ${{ github.ref_name }}
        run: |
          curl -fsSL "https://github.com/saif-shines/doraval/releases/download/${TAG}/doraval-darwin-arm64" -o doraval-darwin-arm64
          curl -fsSL "https://github.com/saif-shines/doraval/releases/download/${TAG}/doraval-darwin-x64" -o doraval-darwin-x64

      - name: Compute SHAs and update formula
        env:
          TAG: ${{ github.ref_name }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${TAG#v}
          ARM64_SHA=$(sha256sum doraval-darwin-arm64 | awk '{print $1}')
          X64_SHA=$(sha256sum doraval-darwin-x64 | awk '{print $1}')
          bash scripts/update-homebrew.sh "$VERSION" "$ARM64_SHA" "$X64_SHA"
