name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS x64 (Intel) - bun cross-compiles the target regardless of host arch;
          # macos-13 (Intel) hosted runner pool is retired/unassignable, use macos-latest
          - runner: macos-latest
            target: bun-darwin-x64
            binary: doraval-darwin-x64

          # macOS arm64 (Apple Silicon)
          - runner: macos-latest
            target: bun-darwin-arm64
            binary: doraval-darwin-arm64

          # Linux x64 (glibc)
          - runner: ubuntu-latest
            target: bun-linux-x64
            binary: doraval-linux-x64

          # Linux arm64 (use arm runner so the arm64 native deps are installed)
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            binary: doraval-linux-arm64

          # Windows x64 (native host — no cross-compile dance needed)
          - runner: windows-latest
            target: bun-windows-x64
            binary: doraval-win32-x64.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Ensure target-specific native bindings for @opentui/core
        shell: bash
        run: |
          # bun/npm filter optionalDependencies by the HOST os/cpu, not the
          # --target we're cross-compiling for. macos-latest runners are
          # arm64, so `bun add @opentui/core-darwin-x64` (cpu:x64) silently
          # no-ops there — the package never lands in node_modules and
          # `bun build --compile` fails to resolve it. Fetch that one
          # manually to bypass the host-platform check.
          fetch_pkg() {
            local pkg="$1" version tarball_name
            version=$(node -pe "require('./node_modules/@opentui/core/package.json').optionalDependencies['$pkg']")
            tarball_name=$(echo "$pkg" | sed 's/^@//; s/\//-/g')
            mkdir -p "node_modules/$pkg"
            npm pack "$pkg@$version" --silent --pack-destination /tmp
            tar -xzf "/tmp/${tarball_name}-${version}.tgz" -C "node_modules/$pkg" --strip-components=1
          }

          case "${{ matrix.target }}" in
            bun-darwin-arm64)
              bun add --optional @opentui/core-darwin-arm64 ;;
            bun-darwin-x64)
              fetch_pkg "@opentui/core-darwin-x64" ;;
            bun-linux-x64)
              bun add --optional @opentui/core-linux-x64 ;;
            bun-linux-arm64)
              bun add --optional @opentui/core-linux-arm64 @opentui/core-linux-arm64-musl ;;
            bun-windows-x64)
              bun add --optional @opentui/core-win32-x64 ;;
          esac

      - name: Build compiled binary
        shell: bash
        run: |
          bun build ./src/cli/index.ts --compile --target ${{ matrix.target }} --outfile ${{ matrix.binary }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  smoke-binaries:
    needs: build-binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          # darwin-arm64 host is available; darwin-x64 has no free native runner
          # and ships without a pre-publish smoke run (covered by the
          # post-publish npx verification in publish-npm instead).
          - runner: macos-latest
            binary: doraval-darwin-arm64
          - runner: ubuntu-latest
            binary: doraval-linux-x64
          - runner: ubuntu-24.04-arm
            binary: doraval-linux-arm64
          - runner: windows-latest
            binary: doraval-win32-x64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.binary }}
      - name: Run the real binary — version + JSON scan, non-TTY
        shell: bash
        run: |
          chmod +x ${{ matrix.binary }} 2>/dev/null || true
          ./${{ matrix.binary }} --version
          mkdir -p smoke-repo/.git && cd smoke-repo
          ../${{ matrix.binary }} --format json | grep -q '"empty"'

  create-release:
    needs: [build-binaries, smoke-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download compiled binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude="$TAG" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            BODY=$(git log --pretty=format:"* %s" -20)
          else
            BODY=$(git log --pretty=format:"* %s" "$PREV_TAG"..HEAD | grep -vE '^(chore\(release\)|chore: bump version)' || echo "* Bug fixes and improvements")
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed"
          echo ""
          echo "$BODY"
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            artifacts/doraval-darwin-arm64
            artifacts/doraval-darwin-x64
            artifacts/doraval-linux-x64
            artifacts/doraval-linux-arm64
            artifacts/doraval-win32-x64.exe
          draft: false
          prerelease: false
          generate_release_notes: false

  publish-npm:
    needs: [build-binaries, smoke-binaries]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile

      - name: Download compiled binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Assemble platform packages
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          bun run scripts/platform-packages.ts "$VERSION" artifacts platform-packages

      - name: Publish platform packages (all five, then main)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            for dir in platform-packages/*/; do
              (cd "$dir" && npm publish --access public --provenance)
            done
            bun run scripts/prepare-npm-publish.ts
            npm publish --access public --provenance

      - name: Post-publish install verification (the real user path)
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          mkdir -p /tmp/verify/.git && cd /tmp/verify
          for i in 1 2 3 4 5; do
            npx -y @hacksmith/doraval@"$VERSION" --version && break
            echo "registry not consistent yet, retry $i" && sleep 20
          done
          npx -y @hacksmith/doraval@"$VERSION" --format json | grep -q '"empty"'

  publish-jsr:
    needs: [build-binaries, smoke-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx jsr publish

  update-homebrew:
    needs: create-release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS binaries from release
        env:
          TAG: ${{ github.ref_name }}
        run: |
          curl -fsSL "https://github.com/saif-shines/doraval/releases/download/${TAG}/doraval-darwin-arm64" -o doraval-darwin-arm64
          curl -fsSL "https://github.com/saif-shines/doraval/releases/download/${TAG}/doraval-darwin-x64" -o doraval-darwin-x64

      - name: Compute SHAs and update formula
        env:
          TAG: ${{ github.ref_name }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${TAG#v}
          ARM64_SHA=$(sha256sum doraval-darwin-arm64 | awk '{print $1}')
          X64_SHA=$(sha256sum doraval-darwin-x64 | awk '{print $1}')
          bash scripts/update-homebrew.sh "$VERSION" "$ARM64_SHA" "$X64_SHA"
