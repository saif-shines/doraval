[build]
  command = "bun install && bun run site:build"
  publish = "apps/website/dist"

[build.environment]
  # Ensure Bun is used
  BUN_VERSION = "1.2"
  # Blume requires Node >= 22.12
  NODE_VERSION = "22"

# Canonical: doraval.dev. Old hosts + www → apex.
[[redirects]]
  from = "https://doraval.thehacksmith.dev/*"
  to = "https://doraval.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.doraval.thehacksmith.dev/*"
  to = "https://doraval.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.doraval.dev/*"
  to = "https://doraval.dev/:splat"
  status = 301
  force = true

# Legacy apex that once hosted docs
[[redirects]]
  from = "https://thehacksmith.dev/*"
  to = "https://doraval.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.thehacksmith.dev/*"
  to = "https://doraval.dev/:splat"
  status = 301
  force = true

